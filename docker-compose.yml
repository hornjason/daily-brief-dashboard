services:
  dashboard:
    image: ghcr.io/hornjason/daily-brief-dashboard:latest
    container_name: pai-dashboard
    restart: unless-stopped
    ports:
      - "7777:7777"
      - "127.0.0.1:6080:6080"
    volumes:
      # Single persistent volume — covers config, cache, and RH browser profile.
      # First-time setup:
      #   mkdir -p ./data/config ./data/cache ./data/rh-profile
      #   cp your-customers.json ./data/config/customers.json
      - ./data:/data
    environment:
      PORT: "7777"
      CONFIG_DIR: /data/config
      CACHE_DIR: /data/cache
      RH_PROFILE_DIR: /data/rh-profile
    env_file:
      - .env
    shm_size: '2g'
